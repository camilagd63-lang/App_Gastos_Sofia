<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos - Foráneos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .balance-box {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-box h2 {
            font-size: 32px;
            margin-top: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input, .row select {
            flex: 1;
            width: 50%;
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            resize: none;
            height: 60px;
            font-family: inherit;
        }

        button {
            background-color: #34495e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2c3e50;
        }

        h3 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }

        .expense-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            background-color: #fdfdfd;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #34495e;
        }

        .expense-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 70%;
        }

        .expense-title {
            font-weight: 600;
            color: #2c3e50;
        }

        .expense-desc {
            font-size: 13px;
            color: #7f8c8d;
            font-style: italic;
            word-break: break-word;
        }

        .expense-meta {
            font-size: 11px;
            color: #bdc3c7;
            text-transform: uppercase;
            font-weight: bold;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .expense-amount {
            font-weight: bold;
            color: #e74c3c;
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            transition: transform 0.2s;
        }

        .delete-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mis Gastos Foráneos 🎓</h1>
    
    <div class="balance-box">
        <p>Total Gastado Histórico</p>
        <h2 id="total-amount">$0</h2>
    </div>

    <form id="expense-form">
        <div class="row">
            <input type="text" id="expense-name" placeholder="¿Qué compraste?" required>
            <input type="number" id="expense-value" placeholder="Monto ($)" required min="1">
        </div>
        
        <select id="expense-category">
            <option value="Comida">🍔 Comida</option>
            <option value="Transporte">🚌 Transporte</option>
            <option value="Estudios">📚 Estudios</option>
            <option value="Alquiler/Servicios">🏠 Alquiler / Servicios</option>
            <option value="Ocio">🎉 Ocio / Otros</option>
        </select>

        <textarea id="expense-description" placeholder="Añade una descripción o detalle (opcional)..." maxlength="150"></textarea>
        
        <button type="submit">Guardar Gasto en Historial</button>
    </form>

    <h3>Historial de Registros</h3>
    <ul class="expense-list" id="expense-list">
        </ul>
</div>

<script>
    const expenseForm = document.getElementById('expense-form');
    const expenseName = document.getElementById('expense-name');
    const expenseValue = document.getElementById('expense-value');
    const expenseCategory = document.getElementById('expense-category');
    const expenseDescription = document.getElementById('expense-description');
    const expenseList = document.getElementById('expense-list');
    const totalAmount = document.getElementById('total-amount');

    // Cargar del localStorage
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    function updateUI() {
        expenseList.innerHTML = '';
        let total = 0;

        // Mostrar los gastos (los más nuevos aparecerán arriba en el historial)
        expenses.slice().reverse().forEach((expense, inverseIndex) => {
            total += expense.amount;

            // Calcular el índice real en el arreglo original para poder borrarlo correctamente
            const originalIndex = expenses.length - 1 - inverseIndex;

            const li = document.createElement('li');
            li.classList.add('expense-item');
            
            // Si no hay descripción, dejamos el campo vacío en el diseño
            const descHtml = expense.description ? `<span class="expense-desc">"${expense.description}"</span>` : '';

            li.innerHTML = `
                <div class="expense-info">
                    <span class="expense-title">${expense.name}</span>
                    ${descHtml}
                    <span class="expense-meta">${expense.category}</span>
                </div>
                <div class="expense-right">
                    <span class="expense-amount">-$${expense.amount.toLocaleString()}</span>
                    <button class="delete-btn" onclick="deleteExpense(${originalIndex})">❌</button>
                </div>
            `;
            expenseList.appendChild(li);
        });

        totalAmount.innerText = `$${total.toLocaleString()}`;
        localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    expenseForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const newExpense = {
            name: expenseName.value,
            amount: parseFloat(expenseValue.value),
            category: expenseCategory.value,
            description: expenseDescription.value.trim() // Guardamos la descripción limpia
        };

        expenses.push(newExpense);
        updateUI();
        expenseForm.reset();
    });

    window.deleteExpense = function(index) {
        if(confirm("¿Seguro que quieres eliminar este registro del historial?")) {
            expenses.splice(index, 1);
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
