<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos - Foráneos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .balance-box {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-box p {
            font-size: 14px;
            opacity: 0.9;
        }

        .balance-box h2 {
            font-size: 32px;
            margin-top: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            flex: 1;
            width: 50%;
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            background-color: #fff;
        }

        textarea {
            resize: none;
            height: 60px;
            font-family: inherit;
        }

        button {
            background-color: #34495e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2c3e50;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        h3 {
            color: #2c3e50;
            font-size: 18px;
        }

        #month-filter {
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
        }

        .expense-list {
            list-style: none;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            background-color: #fdfdfd;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #34495e;
        }

        .expense-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 70%;
        }

        .expense-title {
            font-weight: 600;
            color: #2c3e50;
        }

        .expense-desc {
            font-size: 13px;
            color: #7f8c8d;
            font-style: italic;
            word-break: break-word;
        }

        .expense-meta {
            font-size: 11px;
            color: #bdc3c7;
            text-transform: uppercase;
            font-weight: bold;
        }

        .expense-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .expense-amount {
            font-weight: bold;
            color: #e74c3c;
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
        }
        
        .sync-status {
            font-size: 11px;
            color: #27ae60;
            text-align: center;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mis Gastos Foráneos 🎓</h1>
    
    <div class="balance-box">
        <p>Total Gastado en <span id="current-month-label">este mes</span></p>
        <h2 id="total-amount">$0</h2>
    </div>

    <div id="sync-label" class="sync-status">🔄 Sincronizando con Google Sheets...</div>

    <form id="expense-form">
        <div class="row">
            <input type="text" id="expense-name" placeholder="¿Qué compraste?" required>
            <input type="number" id="expense-value" placeholder="Monto ($)" required min="1">
        </div>
        
        <select id="expense-category">
            <option value="Comida">🍔 Comida</option>
            <option value="Transporte">🚌 Transporte</option>
            <option value="Estudios">📚 Estudios</option>
            <option value="Alquiler/Servicios">🏠 Alquiler / Servicios</option>
            <option value="Ocio">🎉 Ocio / Otros</option>
        </select>

        <textarea id="expense-description" placeholder="Añade una descripción o detalle (opcional)..." maxlength="150"></textarea>
        
        <button type="submit" id="submit-btn">Guardar Gasto</button>
    </form>

    <div class="history-header">
        <h3>Historial</h3>
        <select id="month-filter">
            </select>
    </div>

    <ul class="expense-list" id="expense-list">
        </ul>
</div>

<script>
    // https://script.google.com/macros/s/AKfycbzxdNxjfNoUt-PYftBiBVEz1IcwJhhYvAjmmbjir2Jfz7iSaCbBc3KruqFTV70CSyJBwg/exec
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxdNxjfNoUt-PYftBiBVEz1IcwJhhYvAjmmbjir2Jfz7iSaCbBc3KruqFTV70CSyJBwg/exec";

    const expenseForm = document.getElementById('expense-form');
    const expenseName = document.getElementById('expense-name');
    const expenseValue = document.getElementById('expense-value');
    const expenseCategory = document.getElementById('expense-category');
    const expenseDescription = document.getElementById('expense-description');
    const expenseList = document.getElementById('expense-list');
    const totalAmount = document.getElementById('total-amount');
    const monthFilter = document.getElementById('month-filter');
    const currentMonthLabel = document.getElementById('current-month-label');
    const syncLabel = document.getElementById('sync-label');
    const submitBtn = document.getElementById('submit-btn');

    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    function getMonthYearString(date = new Date()) {
        return date.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    }

    let selectedMonth = getMonthYearString();

    function updateMonthFilterOptions() {
        const currentPeriod = getMonthYearString();
        const periods = expenses.map(exp => exp.period);
        
        if (!periods.includes(currentPeriod)) {
            periods.push(currentPeriod);
        }

        const uniquePeriods = [...new Set(periods)].sort((a, b) => b.localeCompare(a));

        monthFilter.innerHTML = '';
        uniquePeriods.forEach(period => {
            const option = document.createElement('option');
            option.value = period;
            option.innerText = period.charAt(0).toUpperCase() + period.slice(1);
            if (period === selectedMonth) option.selected = true;
            monthFilter.appendChild(option);
        });
    }

    function updateUI() {
        updateMonthFilterOptions();
        expenseList.innerHTML = '';
        let total = 0;

        currentMonthLabel.innerText = selectedMonth;

        expenses.slice().reverse().forEach((expense, inverseIndex) => {
            const originalIndex = expenses.length - 1 - inverseIndex;

            if (expense.period === selectedMonth) {
                total += expense.amount;

                const li = document.createElement('li');
                li.classList.add('expense-item');
                const descHtml = expense.description ? `<span class="expense-desc">"${expense.description}"</span>` : '';

                li.innerHTML = `
                    <div class="expense-info">
                        <span class="expense-title">${expense.name}</span>
                        ${descHtml}
                        <span class="expense-meta">${expense.category}</span>
                    </div>
                    <div class="expense-right">
                        <span class="expense-amount">-$${expense.amount.toLocaleString()}</span>
                        <button class="delete-btn" onclick="deleteExpense(${originalIndex})">❌</button>
                    </div>
                `;
                expenseList.appendChild(li);
            }
        });

        totalAmount.innerText = `$${total.toLocaleString()}`;
        localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    expenseForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const now = new Date();
        const currentPeriod = getMonthYearString(now);

        const newExpense = {
            name: expenseName.value,
            amount: parseFloat(expenseValue.value),
            category: expenseCategory.value,
            description: expenseDescription.value.trim(),
            period: currentPeriod
        };

        // 1. Guardar localmente para respuesta inmediata en la interfaz
        expenses.push(newExpense);
        selectedMonth = currentPeriod; 
        updateUI();
        expenseForm.reset();

        // 2. Enviar a Google Sheets en segundo plano
        if(GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "AQUÍ_PEGA_TU_URL_DE_APPS_SCRIPT") {
            syncLabel.style.display = "block";
            syncLabel.style.color = "#d35400";
            syncLabel.innerText = "⏳ Guardando en Google Sheets...";
            
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Evita problemas de políticas de seguridad del navegador
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(newExpense)
            })
            .then(() => {
                syncLabel.style.color = "#27ae60";
                syncLabel.innerText = "✅ ¡Sincronizado con Google Sheets!";
                setTimeout(() => syncLabel.style.display = "none", 3000);
            })
            .catch(err => {
                console.error(err);
                syncLabel.style.color = "#c0392b";
                syncLabel.innerText = "❌ Error al sincronizar con Sheets";
            });
        }
    });

    monthFilter.addEventListener('change', (e) => {
        selectedMonth = e.target.value;
        updateUI();
    });

    window.deleteExpense = function(index) {
        if(confirm("¿Seguro que deseas eliminar este registro local? (Nota: Esto no lo borrará de Google Sheets)")) {
            expenses.splice(index, 1);
            updateUI();
        }
    }

    updateUI();
</script>

</body>
</html>
